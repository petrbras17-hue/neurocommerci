version: "3.9"

services:
  bot:
    build: .
    command: python main.py
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://nc:${DB_PASSWORD:-neuropass}@db:5432/neurocomment
      - REDIS_URL=redis://redis:6379/0
      - WORKER_ID=bot
    volumes:
      - sessions_data:/app/data/sessions
      - backups_data:/app/data/session_backups
      - avatars_data:/app/data/avatars
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    command: python worker.py
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://nc:${DB_PASSWORD:-neuropass}@db:5432/neurocomment
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - sessions_data:/app/data/sessions
      - avatars_data:/app/data/avatars
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 3
    restart: unless-stopped

  packager:
    build: .
    command: python packager_worker.py
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://nc:${DB_PASSWORD:-neuropass}@db:5432/neurocomment
      - REDIS_URL=redis://redis:6379/0
      - WORKER_ID=packager
    volumes:
      - sessions_data:/app/data/sessions
      - avatars_data:/app/data/avatars
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: neurocomment
      POSTGRES_USER: nc
      POSTGRES_PASSWORD: ${DB_PASSWORD:-neuropass}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nc -d neurocomment"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  sessions_data:
  backups_data:
  avatars_data:
  redis_data:
  pg_data:
